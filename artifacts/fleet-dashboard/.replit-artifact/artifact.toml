kind = "web"
previewPath = "/"
title = "Fleet Inventory Dashboard"
version = "1.0.0"
id = "artifacts/fleet-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19295

[services.development]
run = "pnpm --filter @workspace/fleet-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fleet-dashboard", "run", "build" ]
publicDir = "artifacts/fleet-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19295"
BASE_PATH = "/"
