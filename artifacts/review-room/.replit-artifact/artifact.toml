kind = "web"
previewPath = "/review-room/"
title = "Review Room"
version = "1.0.0"
id = "artifacts/review-room"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/review-room/" ]
localPort = 22409

[services.development]
run = "pnpm --filter @workspace/review-room run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/review-room", "run", "build" ]
publicDir = "artifacts/review-room/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22409"
BASE_PATH = "/review-room/"
